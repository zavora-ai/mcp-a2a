<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/><stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1400"/><stop offset="100%" style="stop-color:#2d2200"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/><stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" rx="12" fill="#0a0800"/>

  <text x="400" y="32" text-anchor="middle" fill="#fef3c7" font-size="16" font-weight="700">A2A Remote Agent MCP — Architecture</text>

  <!-- MCP Clients -->
  <rect x="40" y="50" width="200" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="140" y="75" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">MCP Clients</text>
  <text x="140" y="95" text-anchor="middle" fill="#94a3b8" font-size="9">Kiro · Claude · Codex</text>
  <text x="140" y="110" text-anchor="middle" fill="#94a3b8" font-size="9">Cursor · Windsurf</text>

  <!-- Arrow -->
  <path d="M240 90 L290 90" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="290,86 298,90 290,94" fill="#f59e0b"/>
  <text x="265" y="82" text-anchor="middle" fill="#fcd34d" font-size="8">MCP</text>

  <!-- MCP A2A Server -->
  <rect x="300" y="48" width="200" height="84" rx="8" fill="url(#sg)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="72" text-anchor="middle" fill="url(#hg)" font-size="12" font-weight="700">mcp-a2a Server</text>
  <text x="400" y="90" text-anchor="middle" fill="#fde68a" font-size="9">11 MCP Tools</text>
  <text x="400" y="105" text-anchor="middle" fill="#92400e" font-size="8">discover · message · task · push</text>
  <text x="400" y="118" text-anchor="middle" fill="#92400e" font-size="8">validate · stream · cancel</text>

  <!-- Arrow to agents -->
  <path d="M500 90 L550 90" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="550,86 558,90 550,94" fill="#f59e0b"/>
  <text x="525" y="82" text-anchor="middle" fill="#fcd34d" font-size="8">A2A</text>

  <!-- Remote Agents header -->
  <rect x="560" y="48" width="200" height="84" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="660" y="72" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">Remote A2A Agents</text>
  <text x="660" y="90" text-anchor="middle" fill="#94a3b8" font-size="9">Any framework</text>
  <text x="660" y="105" text-anchor="middle" fill="#94a3b8" font-size="9">Any language</text>
  <text x="660" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">Any cloud</text>

  <!-- Tools row -->
  <rect x="40" y="150" width="720" height="50" rx="6" fill="url(#sg)" stroke="#92400e" stroke-width="1"/>
  <text x="90" y="172" text-anchor="middle" fill="#fde68a" font-size="8" font-weight="600">resolve</text>
  <text x="90" y="186" text-anchor="middle" fill="#92400e" font-size="7">agent_card</text>
  <text x="175" y="172" text-anchor="middle" fill="#fde68a" font-size="8" font-weight="600">validate</text>
  <text x="175" y="186" text-anchor="middle" fill="#92400e" font-size="7">agent_card</text>
  <text x="260" y="172" text-anchor="middle" fill="#fde68a" font-size="8" font-weight="600">list</text>
  <text x="260" y="186" text-anchor="middle" fill="#92400e" font-size="7">remote_agents</text>
  <text x="345" y="172" text-anchor="middle" fill="#fde68a" font-size="8" font-weight="600">send</text>
  <text x="345" y="186" text-anchor="middle" fill="#92400e" font-size="7">message</text>
  <text x="425" y="172" text-anchor="middle" fill="#fde68a" font-size="8" font-weight="600">stream</text>
  <text x="425" y="186" text-anchor="middle" fill="#92400e" font-size="7">message</text>
  <text x="505" y="172" text-anchor="middle" fill="#fde68a" font-size="8" font-weight="600">get/list</text>
  <text x="505" y="186" text-anchor="middle" fill="#92400e" font-size="7">tasks</text>
  <text x="580" y="172" text-anchor="middle" fill="#fde68a" font-size="8" font-weight="600">cancel</text>
  <text x="580" y="186" text-anchor="middle" fill="#92400e" font-size="7">task</text>
  <text x="655" y="172" text-anchor="middle" fill="#fde68a" font-size="8" font-weight="600">subscribe</text>
  <text x="655" y="186" text-anchor="middle" fill="#92400e" font-size="7">to_task</text>
  <text x="725" y="172" text-anchor="middle" fill="#fde68a" font-size="8" font-weight="600">push</text>
  <text x="725" y="186" text-anchor="middle" fill="#92400e" font-size="7">notifications</text>

  <!-- Framework agents -->
  <text x="400" y="225" text-anchor="middle" fill="#fef3c7" font-size="12" font-weight="700">Compatible Frameworks</text>

  <!-- Google ADK -->
  <rect x="40" y="240" width="170" height="100" rx="6" fill="url(#bg)" stroke="#4285f4" stroke-width="1.5"/>
  <text x="125" y="262" text-anchor="middle" fill="#4285f4" font-size="11" font-weight="700">Google ADK</text>
  <text x="125" y="280" text-anchor="middle" fill="#94a3b8" font-size="9">Python · Go · Java</text>
  <text x="125" y="296" text-anchor="middle" fill="#64748b" font-size="8">adk api_server --a2a</text>
  <text x="125" y="312" text-anchor="middle" fill="#64748b" font-size="8">Gemini · Tools · Skills</text>
  <rect x="60" y="322" width="130" height="12" rx="3" fill="#4285f4" opacity="0.2"/>
  <text x="125" y="332" text-anchor="middle" fill="#93c5fd" font-size="7">Port 8001</text>

  <!-- LangGraph -->
  <rect x="220" y="240" width="170" height="100" rx="6" fill="url(#bg)" stroke="#10b981" stroke-width="1.5"/>
  <text x="305" y="262" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700">LangGraph</text>
  <text x="305" y="280" text-anchor="middle" fill="#94a3b8" font-size="9">Python · TypeScript</text>
  <text x="305" y="296" text-anchor="middle" fill="#64748b" font-size="8">a2a-sdk / custom server</text>
  <text x="305" y="312" text-anchor="middle" fill="#64748b" font-size="8">Graphs · Chains · Tools</text>
  <rect x="240" y="322" width="130" height="12" rx="3" fill="#10b981" opacity="0.2"/>
  <text x="305" y="332" text-anchor="middle" fill="#6ee7b7" font-size="7">Port 8002 ✓ Tested</text>

  <!-- ADK-Rust -->
  <rect x="400" y="240" width="170" height="100" rx="6" fill="url(#bg)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="485" y="262" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">ADK-Rust</text>
  <text x="485" y="280" text-anchor="middle" fill="#94a3b8" font-size="9">Rust</text>
  <text x="485" y="296" text-anchor="middle" fill="#64748b" font-size="8">adk-server --a2a</text>
  <text x="485" y="312" text-anchor="middle" fill="#64748b" font-size="8">Agents · Graph · MCP</text>
  <rect x="420" y="322" width="130" height="12" rx="3" fill="#f59e0b" opacity="0.2"/>
  <text x="485" y="332" text-anchor="middle" fill="#fcd34d" font-size="7">Port 8003</text>

  <!-- CrewAI -->
  <rect x="580" y="240" width="170" height="100" rx="6" fill="url(#bg)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="665" y="262" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">CrewAI</text>
  <text x="665" y="280" text-anchor="middle" fill="#94a3b8" font-size="9">Python</text>
  <text x="665" y="296" text-anchor="middle" fill="#64748b" font-size="8">A2A wrapper</text>
  <text x="665" y="312" text-anchor="middle" fill="#64748b" font-size="8">Crews · Tasks · Agents</text>
  <rect x="600" y="322" width="130" height="12" rx="3" fill="#a78bfa" opacity="0.2"/>
  <text x="665" y="332" text-anchor="middle" fill="#c4b5fd" font-size="7">Port 8004</text>

  <!-- Protocol flow -->
  <rect x="40" y="360" width="720" height="65" rx="6" fill="#0c0a00" stroke="#334155" stroke-width="1"/>
  <text x="400" y="380" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="600">A2A Protocol Flow</text>
  <text x="120" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">1. Discover</text>
  <text x="120" y="413" text-anchor="middle" fill="#64748b" font-size="7">GET /.well-known/agent.json</text>
  <text x="290" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">2. Message</text>
  <text x="290" y="413" text-anchor="middle" fill="#64748b" font-size="7">POST / {method: "message/send"}</text>
  <text x="470" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">3. Track</text>
  <text x="470" y="413" text-anchor="middle" fill="#64748b" font-size="7">POST / {method: "tasks/get"}</text>
  <text x="650" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">4. Stream</text>
  <text x="650" y="413" text-anchor="middle" fill="#64748b" font-size="7">POST /stream {SSE events}</text>

  <!-- Badges -->
  <rect x="40" y="440" width="80" height="22" rx="4" fill="#f59e0b"/>
  <text x="80" y="455" text-anchor="middle" fill="white" font-size="9" font-weight="600">rmcp 1.7</text>

  <rect x="128" y="440" width="80" height="22" rx="4" fill="#b45309"/>
  <text x="168" y="455" text-anchor="middle" fill="white" font-size="9" font-weight="600">11 Tools</text>

  <rect x="216" y="440" width="100" height="22" rx="4" fill="#4285f4"/>
  <text x="266" y="455" text-anchor="middle" fill="white" font-size="9" font-weight="600">Google ADK</text>

  <rect x="324" y="440" width="90" height="22" rx="4" fill="#10b981"/>
  <text x="369" y="455" text-anchor="middle" fill="white" font-size="9" font-weight="600">LangGraph</text>

  <rect x="422" y="440" width="85" height="22" rx="4" fill="#d97706"/>
  <text x="464" y="455" text-anchor="middle" fill="white" font-size="9" font-weight="600">ADK-Rust</text>

  <rect x="515" y="440" width="75" height="22" rx="4" fill="#a78bfa"/>
  <text x="552" y="455" text-anchor="middle" fill="white" font-size="9" font-weight="600">CrewAI</text>

  <rect x="598" y="440" width="162" height="22" rx="4" fill="#be185d"/>
  <text x="679" y="455" text-anchor="middle" fill="white" font-size="9" font-weight="600">ADK-Rust Enterprise</text>

  <text x="400" y="500" text-anchor="middle" fill="#475569" font-size="10">enterprise.adk-rust.com · A2A Protocol: github.com/google/A2A · Apache-2.0</text>
</svg>
